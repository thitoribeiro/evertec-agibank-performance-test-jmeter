# =============================================================
# BlazeDemo Load Test — Scenario Parameters
# Pass to JMeter with: -q config/load-test.properties
# =============================================================

# --- Target ---
host=www.blazedemo.com
protocol=https

# --- Thread Group ---
threads=250
ramp_up=180
duration=300

# --- Think Time (ms) ---
think_time=1000

# --- Timeouts (ms) ---
connect_timeout=5000
response_timeout=10000
